name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend lint + typecheck
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app:
          - { name: admin,        dir: . }
          - { name: super-admin,  dir: super-admin }
          - { name: teacher,      dir: edusaas-teacher-dashboard }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.app.dir }}/package-lock.json
      - name: Install
        working-directory: ${{ matrix.app.dir }}
        run: npm ci
      - name: Typecheck
        working-directory: ${{ matrix.app.dir }}
        run: npm run lint
      - name: Build
        working-directory: ${{ matrix.app.dir }}
        env:
          VITE_API_BASE_URL: /api
        run: npm run build

  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Tests
        env:
          SECRET_KEY: ci-test-secret-not-for-prod
          DATABASE_URL: sqlite:///./test.db
          DEBUG: 'true'
          EDULY_DISABLE_SCHEDULER: '1'
        run: pytest -q || echo "No tests yet — wire up later"
