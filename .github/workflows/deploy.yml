name: Deploy to DigitalOcean

# Triggered on push to main, or manually from the Actions tab.
# Required repository secrets:
#   DEPLOY_HOST          → droplet IP or hostname (e.g. 165.227.1.2)
#   DEPLOY_USER          → ssh user (e.g. root or deploy)
#   DEPLOY_SSH_KEY       → private key (entire contents of id_ed25519)
#   DEPLOY_KNOWN_HOSTS   → output of `ssh-keyscan <host>` (locks host fingerprint)
#   API_URL              → e.g. https://eduly.uz/api
#   GEMINI_API_KEY       → optional, leave blank if not used in browser

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Build the three frontends ─────────────────────────────────
      - name: Build admin SPA
        env:
          VITE_API_BASE_URL: ${{ secrets.API_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cat > .env.production <<EOF
          VITE_API_BASE_URL=${VITE_API_BASE_URL}
          GEMINI_API_KEY=${GEMINI_API_KEY}
          EOF
          npm ci
          npm run build

      - name: Build super-admin SPA
        env:
          VITE_API_BASE_URL: ${{ secrets.API_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        working-directory: super-admin
        run: |
          cat > .env.production <<EOF
          VITE_API_BASE_URL=${VITE_API_BASE_URL}
          VITE_BASE_PATH=/super/
          GEMINI_API_KEY=${GEMINI_API_KEY}
          EOF
          npm ci
          npm run build

      - name: Build teacher dashboard SPA
        env:
          VITE_API_BASE_URL: ${{ secrets.API_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        working-directory: edusaas-teacher-dashboard
        run: |
          cat > .env.production <<EOF
          VITE_API_BASE_URL=${VITE_API_BASE_URL}
          VITE_BASE_PATH=/teacher/
          GEMINI_API_KEY=${GEMINI_API_KEY}
          EOF
          npm ci
          npm run build

      # ── SSH setup with locked-down known_hosts ────────────────────
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "${{ secrets.DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      # ── Sync artifacts to droplet ─────────────────────────────────
      - name: Rsync backend source
        run: |
          rsync -az --delete \
            --exclude venv --exclude __pycache__ --exclude '*.pyc' \
            --exclude eduly.db --exclude .env \
            -e "ssh -i ~/.ssh/id_ed25519" \
            backend/ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/var/www/eduly/backend/

      - name: Rsync frontend dists
        run: |
          SSH="ssh -i ~/.ssh/id_ed25519"
          DEST=${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}
          rsync -az --delete -e "$SSH" dist/                           $DEST:/var/www/eduly/admin/
          rsync -az --delete -e "$SSH" super-admin/dist/               $DEST:/var/www/eduly/super-admin/
          rsync -az --delete -e "$SSH" edusaas-teacher-dashboard/dist/ $DEST:/var/www/eduly/teacher/

      - name: Rsync deployment configs
        run: |
          rsync -az -e "ssh -i ~/.ssh/id_ed25519" \
            deployment/ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/var/www/eduly/deployment/

      # ── Run migrations + restart backend ──────────────────────────
      - name: Migrate DB and restart service
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} bash <<'REMOTE'
          set -euo pipefail
          chown -R www-data:www-data /var/www/eduly
          cd /var/www/eduly/backend
          source venv/bin/activate
          pip install -q -r requirements.txt
          alembic upgrade head
          systemctl restart eduly
          systemctl --no-pager status eduly | head -n 10
          REMOTE

      # ── Smoke test ────────────────────────────────────────────────
      - name: Smoke test
        run: |
          set -e
          BASE="${{ secrets.API_URL }}"
          BASE="${BASE%/api}"
          echo "Checking $BASE/api/health"
          curl -fsS "$BASE/api/health" || (echo "Health check failed"; exit 1)
          echo "Checking $BASE/"
          curl -fsSI "$BASE/" | head -1
