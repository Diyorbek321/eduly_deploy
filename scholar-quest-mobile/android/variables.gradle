ext {
    // Bumped from 22 → 23 because Firebase Messaging 25.x (pulled in by
    // @capacitor/push-notifications) requires minSdk 23. API 23 = Android
    // 6.0 Marshmallow (2015), still covers >99% of active devices.
    minSdkVersion = 23
    // Capacitor 8 references VANILLA_ICE_CREAM (API 35) constants, so the
    // compile SDK must be ≥35. Using the 36 we have on disk.
    compileSdkVersion = 36
    targetSdkVersion = 35
    androidxActivityVersion = '1.8.0'
    androidxAppCompatVersion = '1.6.1'
    androidxCoordinatorLayoutVersion = '1.2.0'
    androidxCoreVersion = '1.12.0'
    androidxFragmentVersion = '1.6.2'
    coreSplashScreenVersion = '1.0.1'
    androidxWebkitVersion = '1.9.0'
    junitVersion = '4.13.2'
    androidxJunitVersion = '1.1.5'
    androidxEspressoCoreVersion = '3.5.1'
    cordovaAndroidVersion = '10.1.1'
}