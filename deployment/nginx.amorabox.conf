# Eduly — Nginx config for the `amorabox` domain (single-domain layout).
#
# Layout (everything under one host — best fit for a 1GB droplet):
#   https://amorabox.uz/          → admin SPA           (/var/www/eduly/admin)
#   https://amorabox.uz/super/    → super-admin SPA     (/var/www/eduly/super-admin)
#   https://amorabox.uz/teacher/  → teacher dashboard   (/var/www/eduly/teacher)
#   https://amorabox.uz/api/      → FastAPI on 127.0.0.1:8000
#
# IMPORTANT — replace `amorabox.uz` with your actual TLD before installing:
#   sed -i 's/amorabox\.uz/YOUR_ACTUAL_DOMAIN/g' deployment/nginx.amorabox.conf
#
# Install:
#   sudo cp deployment/nginx.amorabox.conf /etc/nginx/sites-available/eduly
#   sudo ln -sf /etc/nginx/sites-available/eduly /etc/nginx/sites-enabled/eduly
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
# Then issue HTTPS cert:
#   sudo certbot --nginx -d amorabox.uz -d www.amorabox.uz

server {
    listen 80;
    listen [::]:80;
    server_name amorabox.uz www.amorabox.uz;

    client_max_body_size 25M;

    # ── Backend API ──────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Hide FastAPI's interactive docs from the public.
    location = /docs        { return 404; }
    location = /redoc       { return 404; }
    location = /openapi.json { return 404; }

    # ── Super-admin SPA at /super/ ───────────────────────────────────────
    location /super/ {
        alias /var/www/eduly/super-admin/;
        try_files $uri $uri/ /super/index.html;

        location ~* \.(?:js|mjs|css|woff2?|png|jpe?g|gif|svg|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # ── Teacher dashboard SPA at /teacher/ ───────────────────────────────
    location /teacher/ {
        alias /var/www/eduly/teacher/;
        try_files $uri $uri/ /teacher/index.html;

        location ~* \.(?:js|mjs|css|woff2?|png|jpe?g|gif|svg|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # ── Main admin SPA at root ───────────────────────────────────────────
    root /var/www/eduly/admin;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:js|mjs|css|woff2?|png|jpe?g|gif|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options          "SAMEORIGIN" always;
    add_header X-Content-Type-Options   "nosniff" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
}
