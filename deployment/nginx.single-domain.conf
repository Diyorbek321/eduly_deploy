# Single-domain Nginx config for Eduly (eduly.uz)
#
# Layout:
#   https://eduly.uz/         → admin SPA           (/var/www/eduly/admin)
#   https://eduly.uz/super/   → super-admin SPA     (/var/www/eduly/super-admin)
#   https://eduly.uz/teacher/ → teacher dashboard   (/var/www/eduly/teacher)
#   https://eduly.uz/api/     → FastAPI on 127.0.0.1:8000
#
# Install:
#   sudo cp deployment/nginx.single-domain.conf /etc/nginx/sites-available/eduly
#   sudo ln -sf /etc/nginx/sites-available/eduly /etc/nginx/sites-enabled/eduly
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
# Then:
#   sudo certbot --nginx -d eduly.uz -d www.eduly.uz

server {
    listen 80;
    listen [::]:80;
    server_name eduly.uz www.eduly.uz;

    # Let certbot handle the redirect to HTTPS after issuing the cert.
    # Until then, plain HTTP must work for the ACME challenge.

    client_max_body_size 25M;

    # ── Backend API ──────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # FastAPI's interactive docs (optional — comment out in production if you want them private)
    location = /docs        { proxy_pass http://127.0.0.1:8000/docs; }
    location = /openapi.json { proxy_pass http://127.0.0.1:8000/openapi.json; }

    # ── Super-admin SPA at /super/ ───────────────────────────────────────
    location /super/ {
        alias /var/www/eduly/super-admin/;
        try_files $uri $uri/ /super/index.html;

        location ~* \.(?:js|mjs|css|woff2?|png|jpe?g|gif|svg|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # ── Teacher dashboard SPA at /teacher/ ───────────────────────────────
    location /teacher/ {
        alias /var/www/eduly/teacher/;
        try_files $uri $uri/ /teacher/index.html;

        location ~* \.(?:js|mjs|css|woff2?|png|jpe?g|gif|svg|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # ── Main admin SPA at root ───────────────────────────────────────────
    root /var/www/eduly/admin;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:js|mjs|css|woff2?|png|jpe?g|gif|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Security headers (kept simple; tighten CSP later)
    add_header X-Frame-Options          "SAMEORIGIN" always;
    add_header X-Content-Type-Options   "nosniff" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
}
