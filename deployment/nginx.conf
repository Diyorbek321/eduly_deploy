# Eduly — Nginx config for eduly.uz and subdomains.
# After editing, test with:  sudo nginx -t  &&  sudo systemctl reload nginx
#
# Get certificates for all subdomains in one shot:
#   sudo certbot --nginx -d eduly.uz -d www.eduly.uz \
#     -d api.eduly.uz -d super.eduly.uz -d teacher.eduly.uz

# ─── HTTP → HTTPS redirect (covers every host) ────────────────────────────────
server {
    listen 80;
    server_name eduly.uz www.eduly.uz api.eduly.uz super.eduly.uz teacher.eduly.uz;
    return 301 https://$host$request_uri;
}

# ─── api.eduly.uz  →  FastAPI on 127.0.0.1:8000 ───────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.eduly.uz;

    ssl_certificate     /etc/letsencrypt/live/eduly.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/eduly.uz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Hide /docs and /redoc in production. Remove these blocks to re-expose.
    location /docs   { return 404; }
    location /redoc  { return 404; }
}

# ─── eduly.uz  →  main admin SPA (built from /src) ────────────────────────────
server {
    listen 443 ssl http2;
    server_name eduly.uz www.eduly.uz;

    ssl_certificate     /etc/letsencrypt/live/eduly.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/eduly.uz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /var/www/eduly/admin;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long cache for hashed assets, no-cache for index.html
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|webp|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location = /index.html {
        add_header Cache-Control "no-store";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 1024;
}

